name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check imports
        run: |
          python -c "import fastapi, sklearn, xgboost, shap"

      - name: Run training pipeline test
        run: |
          python -c "from src.train import train_pipeline; print('Pipeline OK')"
